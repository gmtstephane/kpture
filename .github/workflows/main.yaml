name: "codecov"
on: [pull_request, push]

jobs:
  kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v3
        with:
          go-version: 1.18
      - name: Checkout
        uses: actions/checkout@v3
      - run: sudo apt update -y && sudo apt-get install -y libpcap-dev
      - run: go mod tidy 
      - name: Run coverage
        run: go test --tags proxy,cli,agent  -race -coverprofile=coverage.txt -covermode=atomic ./pkg/...      
      - name: convert go tests  
        run: gocov convert coverage.txt | gocov annotate - > coverage.cov
      # - name: Upload coverage reports to Codecov
      #   uses: codecov/codecov-action@v3
      - uses: paambaati/codeclimate-action@v3.2.0
        env:
          CC_TEST_REPORTER_ID: 04170e2f85838116d2cdb06a1c808e358ec86e5a03040871361df9cdad443777
        with:
          coverageLocations: ${{github.workspace}}/coverage.cov:gocov
          prefix: $(basename $PWD)
