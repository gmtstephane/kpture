syntax = "proto3";

package service;
option go_package = "github.com/gmtStephane/kpture/api/capture";

message Auxiliary {
  string type_url = 1;
  bytes value = 2;
}  
message CaptureInfo  {
int64 Timestamp = 1;
int64 CaptureLength =2;
int64 Length =3;
int64 InterfaceIndex =4;
repeated Auxiliary AncillaryData =5;
}

message Packet {
  CaptureInfo CaptureInfo = 1;
  bytes data =2;
}


message Empty  {}

service Kpture{
    rpc PacketsStream(Empty) returns (stream Packet) {}
} 

